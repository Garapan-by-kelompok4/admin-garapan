<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>SkillMahasiswa — Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Brand */
    --brand-50:  #EEF2FE;
    --brand-100: #DCE4FD;
    --brand-200: #B6C3F9;
    --brand-300: #7E95F0;
    --brand-400: #4A68E0;
    --brand-500: #2047C9;
    --brand-600: #1938A8;
    --brand-700: #152E88;
    --brand-800: #10255F;

    /* Ink & surface */
    --ink-900: #0F1729;
    --ink-700: #273043;
    --ink-500: #4B5563;
    --ink-400: #6B7280;
    --ink-300: #94A3B8;
    --ink-200: #C9D0DB;

    --surface:     #FFFFFF;
    --surface-2:   #F7F8FB;
    --surface-3:   #EEF1F7;
    --border:      #E5E9F0;
    --border-strong: #D1D7E2;

    /* Feedback */
    --success-50:  #ECFDF5;
    --success-500: #10B981;
    --success-700: #047857;
    --warn-50:     #FFFBEB;
    --warn-500:    #F59E0B;
    --warn-700:    #B45309;
    --danger-50:   #FEF2F2;
    --danger-500:  #EF4444;
    --danger-700:  #B91C1C;
    --info-50:     #EFF6FF;
    --info-500:    #3B82F6;

    /* Radii */
    --r-sm: 6px;
    --r-md: 8px;
    --r-lg: 10px;
    --r-xl: 14px;

    /* Shadow */
    --sh-1: 0 1px 2px rgba(15,23,41,.04), 0 1px 3px rgba(15,23,41,.04);
    --sh-2: 0 4px 12px rgba(15,23,41,.06), 0 2px 4px rgba(15,23,41,.04);
    --sh-3: 0 20px 40px -12px rgba(15,23,41,.18), 0 8px 16px rgba(15,23,41,.06);

    /* Type */
    --f-display: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
    --f-body: "Inter", system-ui, -apple-system, sans-serif;
    --f-mono: "JetBrains Mono", ui-monospace, monospace;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--f-body);
    color: var(--ink-900);
    background: var(--surface-2);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  h1,h2,h3,h4,h5 { font-family: var(--f-display); margin: 0; color: var(--ink-900); }
  button { font-family: inherit; }

  /* ===== Layout ===== */
  .app { min-height: 100vh; display: grid; grid-template-columns: 248px 1fr; }
  .app.no-shell { grid-template-columns: 1fr; }

  /* ===== Sidebar ===== */
  .sidebar {
    background: #FFFFFF;
    border-right: 1px solid var(--border);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .sb-brand {
    display: flex; align-items: center; gap: 10px;
    padding: 20px 20px 18px;
    border-bottom: 1px solid var(--border);
  }
  .sb-logo {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, var(--brand-500), var(--brand-700));
    display: grid; place-items: center;
    color: #fff; font-family: var(--f-display); font-weight: 800; font-size: 16px;
    letter-spacing: -.02em;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.2);
  }
  .sb-brand-name { font-family: var(--f-display); font-weight: 800; font-size: 15px; letter-spacing: -.01em; }
  .sb-brand-sub  { font-size: 11px; color: var(--ink-400); letter-spacing: .02em; }

  .sb-group {
    padding: 14px 12px 4px;
    font-size: 10px; font-weight: 600; color: var(--ink-400);
    text-transform: uppercase; letter-spacing: .08em;
  }
  .sb-nav { flex: 1; overflow-y: auto; padding: 8px 10px 20px; }
  .sb-item {
    width: 100%;
    display: flex; align-items: center; gap: 11px;
    padding: 9px 11px;
    border-radius: 8px;
    color: var(--ink-500);
    font-size: 13.5px; font-weight: 500;
    border: none; background: transparent;
    cursor: pointer;
    text-align: left;
    margin-bottom: 2px;
    transition: background .12s ease, color .12s ease;
  }
  .sb-item:hover { background: var(--surface-3); color: var(--ink-900); }
  .sb-item.active { background: var(--brand-50); color: var(--brand-600); font-weight: 600; }
  .sb-item.active .sb-icon { color: var(--brand-500); }
  .sb-icon { width: 18px; height: 18px; color: var(--ink-400); flex-shrink: 0; }
  .sb-badge {
    margin-left: auto;
    background: var(--danger-500); color: #fff;
    font-size: 10.5px; font-weight: 700;
    padding: 1px 7px; border-radius: 999px;
    min-width: 20px; text-align: center;
  }
  .sb-badge.soft { background: var(--brand-50); color: var(--brand-600); }

  .sb-footer {
    padding: 12px; border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .sb-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #F7C38D, #E9765A);
    display: grid; place-items: center;
    color: #fff; font-weight: 700;
    flex-shrink: 0;
  }
  .sb-footer-text { flex: 1; min-width: 0; }
  .sb-footer-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sb-footer-role { font-size: 11.5px; color: var(--ink-400); }

  /* ===== Top bar ===== */
  .topbar {
    position: sticky; top: 0; z-index: 40;
    background: rgba(255,255,255,.88);
    backdrop-filter: saturate(160%) blur(8px);
    -webkit-backdrop-filter: saturate(160%) blur(8px);
    border-bottom: 1px solid var(--border);
    height: 62px;
    display: flex; align-items: center; gap: 14px;
    padding: 0 28px;
  }
  .tb-search {
    flex: 1; max-width: 520px;
    display: flex; align-items: center; gap: 10px;
    height: 38px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 0 12px;
  }
  .tb-search:focus-within { border-color: var(--brand-400); background: #fff; box-shadow: 0 0 0 3px var(--brand-50); }
  .tb-search input {
    flex: 1; border: none; outline: none; background: transparent;
    font-family: inherit; font-size: 13.5px; color: var(--ink-900);
  }
  .tb-search input::placeholder { color: var(--ink-400); }
  .tb-kbd {
    display: inline-flex; align-items: center;
    font-family: var(--f-mono); font-size: 11px;
    color: var(--ink-400); background: #fff;
    border: 1px solid var(--border); border-radius: 4px;
    padding: 1px 5px;
  }
  .tb-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .tb-icon-btn {
    position: relative;
    width: 38px; height: 38px; border-radius: 9px;
    border: 1px solid var(--border);
    background: #fff;
    display: grid; place-items: center;
    color: var(--ink-500);
    cursor: pointer;
  }
  .tb-icon-btn:hover { color: var(--ink-900); background: var(--surface-3); }
  .tb-dot {
    position: absolute; top: 8px; right: 9px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--danger-500);
    border: 2px solid #fff;
  }
  .tb-profile {
    display: flex; align-items: center; gap: 9px;
    padding: 4px 10px 4px 4px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: #fff;
    cursor: pointer;
  }
  .tb-profile:hover { background: var(--surface-3); }
  .tb-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, #F7C38D, #E9765A);
    display: grid; place-items: center;
    color: #fff; font-weight: 700; font-size: 12px;
  }
  .tb-profile-name { font-size: 13px; font-weight: 600; }

  /* ===== Main ===== */
  .main { display: flex; flex-direction: column; min-width: 0; }
  .page {
    padding: 28px 32px 48px;
    max-width: 1440px;
    width: 100%;
    margin: 0 auto;
  }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 22px; flex-wrap: wrap; }
  .page-title { font-size: 24px; font-weight: 700; letter-spacing: -.02em; }
  .page-sub { color: var(--ink-400); font-size: 13.5px; margin-top: 4px; }

  /* Breadcrumb */
  .crumbs { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--ink-400); margin-bottom: 4px; }
  .crumbs span.sep { color: var(--ink-300); }

  /* ===== Cards ===== */
  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    box-shadow: var(--sh-1);
  }
  .card-pad { padding: 20px 22px; }
  .card-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 22px;
    border-bottom: 1px solid var(--border);
  }
  .card-title { font-size: 15px; font-weight: 700; letter-spacing: -.01em; }

  /* ===== Buttons ===== */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    height: 38px; padding: 0 14px;
    border-radius: 8px;
    font-size: 13.5px; font-weight: 600;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background .12s ease, border-color .12s ease, color .12s ease, box-shadow .12s ease;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--brand-500); color: #fff;
    box-shadow: 0 1px 2px rgba(15,23,41,.12), inset 0 1px 0 rgba(255,255,255,.12);
  }
  .btn-primary:hover { background: var(--brand-600); }
  .btn-secondary {
    background: #fff; color: var(--ink-700);
    border-color: var(--border-strong);
  }
  .btn-secondary:hover { background: var(--surface-3); }
  .btn-success { background: var(--success-500); color: #fff; }
  .btn-success:hover { background: var(--success-700); }
  .btn-danger  { background: var(--danger-500); color: #fff; }
  .btn-danger:hover { background: var(--danger-700); }
  .btn-ghost { background: transparent; color: var(--ink-500); }
  .btn-ghost:hover { background: var(--surface-3); color: var(--ink-900); }
  .btn-sm { height: 32px; padding: 0 10px; font-size: 12.5px; border-radius: 7px; }
  .btn-xs { height: 26px; padding: 0 8px; font-size: 12px; border-radius: 6px; }
  .icon-btn {
    width: 32px; height: 32px; border-radius: 7px;
    border: 1px solid var(--border);
    background: #fff; color: var(--ink-500);
    display: inline-grid; place-items: center; cursor: pointer;
  }
  .icon-btn:hover { background: var(--surface-3); color: var(--ink-900); }

  /* ===== Inputs ===== */
  .input, .select, .textarea {
    width: 100%;
    height: 38px;
    padding: 0 12px;
    border: 1px solid var(--border-strong);
    background: #fff;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13.5px;
    color: var(--ink-900);
    outline: none;
    transition: border-color .12s, box-shadow .12s;
  }
  .textarea { height: auto; padding: 10px 12px; resize: vertical; min-height: 90px; line-height: 1.5; }
  .input:focus, .select:focus, .textarea:focus {
    border-color: var(--brand-400);
    box-shadow: 0 0 0 3px var(--brand-50);
  }
  .label { display: block; font-size: 12.5px; font-weight: 600; color: var(--ink-700); margin-bottom: 6px; }
  .field { margin-bottom: 14px; }

  /* ===== Table ===== */
  .table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13.5px; }
  .table thead th {
    text-align: left;
    font-size: 11.5px; font-weight: 600; color: var(--ink-400);
    text-transform: uppercase; letter-spacing: .04em;
    padding: 11px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);
    white-space: nowrap;
  }
  .table tbody td {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    color: var(--ink-700);
  }
  .table tbody tr:hover td { background: var(--surface-2); }
  .table tbody tr:last-child td { border-bottom: none; }
  .table .num { font-family: var(--f-mono); font-size: 12.5px; color: var(--ink-500); }

  /* ===== Badge / pill ===== */
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11.5px; font-weight: 600;
    padding: 3px 9px;
    border-radius: 999px;
    line-height: 1.4;
    white-space: nowrap;
  }
  .pill::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .8; }
  .pill.no-dot::before { display: none; }
  .pill-success { color: var(--success-700); background: var(--success-50); }
  .pill-warn    { color: var(--warn-700); background: var(--warn-50); }
  .pill-danger  { color: var(--danger-700); background: var(--danger-50); }
  .pill-info    { color: var(--brand-600); background: var(--brand-50); }
  .pill-neutral { color: var(--ink-500); background: var(--surface-3); }

  /* ===== Avatar ===== */
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: inline-grid; place-items: center;
    color: #fff; font-weight: 700; font-size: 12px;
    flex-shrink: 0;
  }
  .avatar-sm { width: 28px; height: 28px; font-size: 11px; }
  .avatar-lg { width: 48px; height: 48px; font-size: 16px; }
  .avatar-xl { width: 72px; height: 72px; font-size: 24px; }
  .av-0 { background: linear-gradient(135deg, #F7C38D, #E9765A); }
  .av-1 { background: linear-gradient(135deg, #93C5FD, #2563EB); }
  .av-2 { background: linear-gradient(135deg, #A7F3D0, #059669); }
  .av-3 { background: linear-gradient(135deg, #FCA5A5, #DC2626); }
  .av-4 { background: linear-gradient(135deg, #C4B5FD, #7C3AED); }
  .av-5 { background: linear-gradient(135deg, #FDE68A, #D97706); }
  .av-6 { background: linear-gradient(135deg, #F9A8D4, #DB2777); }
  .av-7 { background: linear-gradient(135deg, #A5F3FC, #0E7490); }

  /* ===== Tabs ===== */
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 18px; }
  .tab {
    padding: 10px 14px;
    font-size: 13.5px; font-weight: 600;
    color: var(--ink-400);
    background: transparent; border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    margin-bottom: -1px;
  }
  .tab:hover { color: var(--ink-700); }
  .tab.active { color: var(--brand-600); border-bottom-color: var(--brand-500); }

  /* Utility */
  .stack { display: flex; flex-direction: column; }
  .row { display: flex; align-items: center; }
  .grow { flex: 1; }
  .gap-8 { gap: 8px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; } .gap-20 { gap: 20px; } .gap-24 { gap: 24px; }
  .mt-8 { margin-top: 8px; } .mt-16 { margin-top: 16px; } .mt-20 { margin-top: 20px; } .mt-24 { margin-top: 24px; }
  .mb-8 { margin-bottom: 8px; } .mb-12 { margin-bottom: 12px; } .mb-16 { margin-bottom: 16px; } .mb-20 { margin-bottom: 20px; }
  .muted { color: var(--ink-400); }
  .mono { font-family: var(--f-mono); }
  .text-sm { font-size: 12.5px; }
  .text-xs { font-size: 11.5px; }
  .trunc { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ===== Modal ===== */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(15, 23, 41, .48);
    backdrop-filter: blur(2px);
    display: grid; place-items: center;
    padding: 24px;
    animation: fadeIn .16s ease;
  }
  .modal {
    background: #fff;
    border-radius: 14px;
    width: 100%;
    max-width: 560px;
    box-shadow: var(--sh-3);
    max-height: calc(100vh - 48px);
    display: flex; flex-direction: column;
    animation: zoomIn .18s ease;
  }
  .modal-lg { max-width: 820px; }
  .modal-head {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-body { padding: 20px 22px; overflow-y: auto; }
  .modal-foot { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes zoomIn { from { transform: scale(.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* ===== Chart helpers ===== */
  .chart { width: 100%; display: block; }

  /* Empty state */
  .empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--ink-400);
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--ink-200); border-radius: 10px; border: 2px solid var(--surface-2); }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-300); }

  /* Tweaks panel */
  .tweaks-btn {
    position: fixed; right: 18px; bottom: 18px; z-index: 80;
    background: var(--ink-900); color: #fff;
    border: none; border-radius: 999px;
    padding: 10px 14px; font-weight: 600; font-size: 12.5px;
    cursor: pointer; display: none;
    box-shadow: var(--sh-3);
  }
  .tweaks-panel {
    position: fixed; right: 18px; bottom: 64px; z-index: 80;
    width: 300px; background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--sh-3);
    padding: 14px 16px;
    display: none;
    font-size: 13px;
  }
  .tweaks-panel h4 { font-size: 14px; margin-bottom: 10px; }
</style>
</head>
<body>
<div id="root"></div>
